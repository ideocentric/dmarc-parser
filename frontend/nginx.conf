server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — serve index.html for any unmatched path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI backend (strips /api prefix).
    # proxy_redirect rewrites FastAPI's trailing-slash 307 redirects so they
    # keep the /api/ prefix (e.g. Location: /clients/ → /api/clients/).
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_redirect     / /api/;
    }

    # Healthcheck endpoint passthrough
    location /health {
        proxy_pass http://api:8000/health;
    }
}