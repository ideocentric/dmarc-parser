name: dmarc-test

# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose --env-file .env.docker up --build -d
#
# Drop DMARC reports (*.xml.gz or *.zip) into:
#   ./docker-data/reports/incoming/test-client/
#
# GeoIP database (optional — survives data wipes):
#   Place GeoLite2-City.mmdb in ./geoip/
#
# Web UI:  http://localhost:5010
# Login:   admin@example.com / changeme123  (see .env.docker)
#
# Safe data reset (keeps GeoIP database and PostgreSQL data):
#   docker compose down && rm -rf docker-data/reports docker-data/logs
#   docker compose --env-file .env.docker exec db psql -U dmarc -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
#   docker compose --env-file .env.docker up -d
#
# Full reset including database:
#   docker compose down -v && rm -rf docker-data
#   docker compose --env-file .env.docker up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dmarc
      POSTGRES_USER: dmarc
      POSTGRES_PASSWORD: dmarc_dev
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmarc -d dmarc"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/bin/bash", "docker/entrypoint.sh"]
    env_file: .env.docker
    volumes:
      - ./docker-data:/app/data
      - ./geoip:/app/geoip:ro
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── File watcher ─────────────────────────────────────────────────────────────
  watcher:
    build:
      context: .
      dockerfile: Dockerfile
    command: python main.py
    env_file: .env.docker
    volumes:
      - ./docker-data:/app/data
      - ./geoip:/app/geoip:ro
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── React frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5010:80"
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── ClamAV antivirus daemon (optional) ──────────────────────────────────────
  # Uncomment this service and set CLAMAV_ENABLED=true / CLAMAV_HOST=clamav
  # in .env.docker to enable antivirus scanning of ingested DMARC report files.
  #
  # First-boot note: freshclam must download the virus database (~300 MB) before
  # clamd starts accepting connections. Allow 2–5 minutes on first run.
  #
  # clamav:
  #   image: clamav/clamav:stable
  #   networks:
  #     - internal
  #   volumes:
  #     - clamav-data:/var/lib/clamav
  #   healthcheck:
  #     test: ["CMD", "clamdcheck"]
  #     interval: 60s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 300s   # allow time for initial DB download
  #   restart: unless-stopped

networks:
  internal:
    driver: bridge

# Add the clamav-data volume below if uncommenting the ClamAV service above:
# volumes:
#   clamav-data: