# Bootstrap compose override — used ONE TIME to obtain the initial Let's Encrypt certificate.
#
# This overrides the frontend service in docker-compose.prod.yml to use an HTTP-only
# nginx config that serves the ACME challenge directory without requiring SSL certificates
# (which don't exist yet on first deployment).
#
# Usage (run from /opt/dmarc after .env.prod is configured):
#
#   Step 1 — Start the stack with the HTTP-only nginx config:
#     docker compose -f docker-compose.prod.yml -f docker-compose.bootstrap.yml up -d
#
#   Step 2 — Obtain the initial certificate (replace DOMAIN and EMAIL):
#     docker compose -f docker-compose.prod.yml run --rm certbot \
#       certonly --webroot -w /var/www/certbot \
#       -d DOMAIN --email EMAIL@EXAMPLE.COM \
#       --agree-tos --no-eff-email
#
#   Step 3 — Switch to the production HTTPS config:
#     docker compose -f docker-compose.prod.yml up -d --force-recreate frontend
#
# After step 3, this file is no longer needed. The certbot container in
# docker-compose.prod.yml handles all future renewals automatically.

services:
  frontend:
    volumes:
      - ./docker/nginx.bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro