# Production nginx config — HTTPS with Let's Encrypt certificates.
#
# Before first use, replace DOMAIN_PLACEHOLDER with your domain name:
#   sed -i 's/DOMAIN_PLACEHOLDER/dmarc.example.com/g' docker/nginx.prod.conf
#
# This config assumes certificates are already present in the certbot-certs volume.
# Run the bootstrap process first (see deployment guide) to obtain them.

# HTTP — serve ACME challenge for renewals, redirect everything else to HTTPS
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    # TLS 1.2+ only; ciphers follow Mozilla Intermediate compatibility profile
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    root  /usr/share/nginx/html;
    index index.html;

    # React Router — serve index.html for any unmatched path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI backend (strips /api prefix).
    # proxy_redirect rewrites FastAPI's trailing-slash 307 redirects so they
    # keep the /api/ prefix (e.g. Location: /clients/ → /api/clients/).
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_redirect     / /api/;
    }

    # Healthcheck endpoint passthrough
    location /health {
        proxy_pass http://api:8000/health;
    }
}