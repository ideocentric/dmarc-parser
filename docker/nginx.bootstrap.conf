# Bootstrap nginx config — used ONE TIME during initial Let's Encrypt certificate acquisition.
# After running certbot for the first time, switch to nginx.prod.conf (see deployment guide).
#
# This config serves the application over HTTP only and exposes the ACME challenge directory
# so certbot can prove domain ownership before issuing the SSL certificate.

server {
    listen 80;
    server_name _;

    # certbot webroot — challenge files written here by the certbot container
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_redirect     / /api/;
    }

    location /health {
        proxy_pass http://api:8000/health;
    }
}